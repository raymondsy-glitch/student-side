<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Edit User Details</title>
        <link rel="stylesheet" href="css/darkmode.css">
        <link rel="stylesheet" href="css/edit-profile.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>

    <body>

        <nav class="navbar">

            <div class="nav-left">
                <div class="logo-placeholder"></div>
                <span class="logo-text">WhatsUpDLSU</span>
            </div>

            <div class="nav-right">

                <div class="nav-links">
                    <a href="dashboard.html" class="nav-tab">Home</a>
                    <a href="events.html" class="nav-tab">Events</a>
                    <a href="calendar.html" class="nav-tab">Calendar</a>
                </div>

                <div class="profile-section">
                    <button class="profile-btn" id="profileBtn"> Student Name ▼ </button>

                    <div class="dropdown-menu" id="dropdownMenu">
                        <button type="button" class="dark-mode-btn"> DARK/LIGHT MODE </button>
                        <button onclick="window.location.href='edit-profile.html'"> EDIT USER DETAILS </button>
                        <button onclick="window.location.href='index.html'"> LOG OUT </button>
                    </div>
                </div>
            </div>
        </nav>

        <main class="profile-page">

            <div class="profile-container">
                <form id="profileForm">
                    <div class="form-group">
                        <label>Email</label>
                        <div class="input-wrapper">
                            <input type="email" placeholder="juan.delacruz@dlsu.edu.ph" >
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-wrapper">
                            <input type="password" placeholder="password123" >
                        </div>
                    </div>
                </form>
            </div>

            <button class="update-btn" id="updateBtn" > UPDATE </button>
        </main>

        <script src="js/edit-profile.js"></script>
        <script src="js/darkmode.js"></script>
    </body>
</html>
