<!DOCTYPE html>
<html lang="en">
    <head>
        <title>WhatsUpDLSU Dashboard</title>

        <link rel="stylesheet" href="css/dashboard.css">
        <link rel="stylesheet" href="css/darkmode.css">
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    
    <body>

        <nav class="navbar">

            <div class="nav-left">
                <div class="logo-placeholder"></div>
                <span class="logo-text">WhatsUpDLSU</span>
            </div>

            <div class="nav-right">

                <div class="nav-links">
                    <a href="dashboard.html" class="nav-tab active">Home</a>
                    <a href="events.html" class="nav-tab">Events</a>
                    <a href="calendar.html" class="nav-tab">Calendar</a>
                </div>

                <div class="profile-section">
                    <button class="profile-btn" id="profileBtn"> Student Name ▼ </button>

                    <div class="dropdown-menu" id="dropdownMenu">
                        <button type="button" class="dark-mode-btn"> DARK/LIGHT MODE </button>
                        <button onclick="window.location.href='edit-profile.html'"> EDIT USER DETAILS </button>
                        <button onclick="window.location.href='index.html'"> LOG OUT </button>
                    </div>
                </div>
            </div>
        </nav>

        <main class="dashboard-layout">

            <section class="left-column">
                <div class="banner">
                    <h1>Discover What's Happening at DLSU</h1>
                    <p>
                        Stay updated with university events, organization activities,
                        workshops, seminars, and campus announcements.
                    </p>
                </div>

                <div class="carousel-section">
                    <h2>Interested Events!</h2>

                    <div class="carousel">
                        <button class="arrow">&lt;</button>

                        <div id="interestedEventsContainer">
                            <div class="event-card">
                                <h3>No Events Yet</h3>
                                <p>Add events from the Events page</p>
                            </div>
                        </div>

                        <button class="arrow">&gt;</button>
                    </div>
                </div>
            </section>

            <section class="right-column">

                <div class="chart-container">
                    <canvas id="studentChart"></canvas>
                </div>

                <div class="category-box">
                    <h2>Browse by Category</h2>
                    <div class="category-item" onclick="location.href='events.html?category=Academic'">
                        <span class="color academic"></span>
                        Academic
                    </div>
                    <div class="category-item" onclick="location.href='events.html?category=Non-Academic'">
                        <span class="color nonacademic"></span>
                        Non-academic
                    </div>
                    <div class="category-item" onclick="location.href='events.html?category=Career'">
                        <span class="color career"></span>
                        Career
                    </div>
                </div>
            </section>

        </main>

        <script src="js/dashboard.js"></script>
        <script src="js/darkmode.js"></script>
    </body>
</html>
