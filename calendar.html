<!DOCTYPE html>
<html lang="en">
    <head>
        <title>WhatsUpDLSU - Calendar</title>
        <link rel="stylesheet" href="css/darkmode.css">
        <link rel="stylesheet" href="css/calendar.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    
    <body>
        <nav class="navbar">
            <div class="nav-left">
                <div class="logo-placeholder"></div>
                <span class="logo-text">WhatsUpDLSU</span>
            </div>

            <div class="nav-right">
                <div class="nav-links">
                    <a href="dashboard.html" class="nav-tab">Home</a>
                    <a href="events.html" class="nav-tab">Events</a>
                    <a href="calendar.html" class="nav-tab active">Calendar</a>
                </div>

                <div class="profile-section">
                    <button class="profile-btn" id="profileBtn"> Student Name ▼ </button>

                    <div class="dropdown-menu" id="dropdownMenu">
                        <button type="button" class="dark-mode-btn"> DARK/LIGHT MODE </button>
                        <button onclick="location.href='edit-profile.html'"> EDIT USER DETAILS </button>
                        <button onclick="location.href='index.html'"> LOG OUT </button>
                    </div>
                </div>
            </div>
        </nav>

        <main class="calendar-layout">

            <section class="calendar-section">
                <h2 id="monthTitle"></h2>
                <div class="calendar-grid" id="calendarGrid"></div>
            </section>

            <aside class="legend">
                <h3>Event Categories</h3>
                <div class="legend-item">
                    <span class="box academic"></span>
                    Academic
                </div>

                <div class="legend-item">
                    <span class="box nonacademic"></span>
                    Non-Academic
                </div>

                <div class="legend-item">
                    <span class="box career"></span>
                    Career
                </div>
            </aside>
        </main>

        <script src="js/calendar.js"></script>
        <script src="js/darkmode.js"></script>
    </body>
</html>
